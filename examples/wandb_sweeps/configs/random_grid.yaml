method: random
metric:
  name: val_accuracy.max
  goal: maximize
parameters:
  data.batch_size:
    distribution: q_uniform
    q: 16
    min: 16
    max: 512
  model.encoder.class_path:
    value: neudia.encoders.LSTMEncoder
  model.encoder.init_args.dropout:
    distribution: uniform
    min: 0
    max: 0.5
  model.encoder.init_args.embedding_size:
    distribution: q_uniform
    q: 32
    min: 32
    max: 512
  model.encoder.init_args.hidden_size:
    distribution: q_uniform
    q: 32
    min: 32
    max: 1024
  model.optimizer.class_path:
    value: yoyodyne.optimizers.Adam
  model.optimizer.init_args.lr:
    distribution: log_uniform_values
    min: 1.0e-04
    max: 0.01
  model.scheduler.class_path:
    value: yoyodyne.schedulers.WarmupInverseSquareRoot
  model.scheduler.init_args.warmup_epochs:
    distribution: q_uniform
    q: 1
    min: 1
    max: 20
